<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - HealthTrack</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .signup-wrapper {
            width: 100%;
            max-width: 440px;
        }

        .brand {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .brand a {
            font-size: 2rem;
            font-weight: 700;
            color: white;
            text-decoration: none;
            letter-spacing: -0.5px;
        }

        .brand p {
            color: rgba(255, 255, 255, 0.75);
            font-size: 0.9rem;
            margin-top: 0.3rem;
        }

        .card {
            background: rgba(255, 255, 255, 0.98);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.25);
        }

        .card h2 {
            text-align: center;
            margin-bottom: 0.4rem;
            color: #1a1a2e;
            font-size: 1.6rem;
            font-weight: 700;
        }

        .card .subtitle {
            text-align: center;
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            margin-bottom: 0.4rem;
            color: #444;
            font-weight: 500;
            font-size: 0.9rem;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"],
        input[type="tel"] {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 1.5px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.25s ease;
            background: #fafafa;
            color: #1a1a1a;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
        }

        .signup-btn {
            width: 100%;
            padding: 0.9rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 0.5rem;
            position: relative;
            overflow: hidden;
        }

        .signup-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.45);
        }

        .signup-btn:active {
            transform: translateY(0);
        }

        .signup-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .message-box {
            display: none;
            padding: 0.9rem 1rem;
            border-radius: 10px;
            text-align: center;
            font-size: 0.9rem;
            font-weight: 500;
            margin-top: 1rem;
        }

        .message-box.success {
            background: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #a5d6a7;
        }

        .message-box.error {
            background: #fdecea;
            color: #c62828;
            border: 1px solid #ef9a9a;
        }

        .back-link {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.88rem;
            color: #888;
        }

        .back-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .back-link a:hover {
            text-decoration: underline;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin: 1.5rem 0;
            color: #ccc;
            font-size: 0.85rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e8e8e8;
        }
    </style>
</head>

<body>
    <div class="signup-wrapper">
        <div class="brand">
            <a href="index.html.html">HealthTrack</a>
            <p>Your personal health companion</p>
        </div>

        <div class="card">
            <h2>Create Account</h2>
            <p class="subtitle">Join thousands of health-conscious users today</p>

            <form id="signupForm" novalidate>
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" placeholder="Enter your full name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" placeholder="Enter your phone number">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Create a password (min. 6 chars)"
                        required>
                </div>

                <button type="submit" class="signup-btn" id="submitBtn">
                    <span id="btnText">Create My Account</span>
                    <div class="spinner" id="spinner"></div>
                </button>
            </form>

            <div class="message-box" id="messageBox"></div>

            <div class="back-link">
                Already have an account? <a href="index.html.html">Go back to Home</a>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // STEP 1: Replace the URL below with YOUR Google Apps Script
        // Web App URL after deploying (see instructions in README).
        // ============================================================
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw7dLsREprh5byCKKJAbDQRQEqnhNLvy8k50iJIgcjMdDcJp4Nr36SPQ_J2QuxreCf1/exec";

        const form = document.getElementById("signupForm");
        const submitBtn = document.getElementById("submitBtn");
        const btnText = document.getElementById("btnText");
        const spinner = document.getElementById("spinner");
        const messageBox = document.getElementById("messageBox");

        function showMessage(type, text) {
            messageBox.className = "message-box " + type;
            messageBox.textContent = text;
            messageBox.style.display = "block";
        }

        function setLoading(loading) {
            submitBtn.disabled = loading;
            btnText.style.display = loading ? "none" : "inline";
            spinner.style.display = loading ? "block" : "none";
        }

        form.addEventListener("submit", async function (e) {
            e.preventDefault();

            const name = document.getElementById("name").value.trim();
            const email = document.getElementById("email").value.trim();
            const phone = document.getElementById("phone").value.trim();
            const password = document.getElementById("password").value;

            // Basic validation
            if (!name) { showMessage("error", "Please enter your full name."); return; }
            if (!email || !/\S+@\S+\.\S+/.test(email)) { showMessage("error", "Please enter a valid email address."); return; }
            if (password.length < 6) { showMessage("error", "Password must be at least 6 characters."); return; }

            setLoading(true);
            messageBox.style.display = "none";

            // Check if the script URL has been configured
            if (GOOGLE_SCRIPT_URL.includes("YOUR_SCRIPT_ID_HERE")) {
                setTimeout(() => {
                    setLoading(false);
                    showMessage("success", "✅ Form is ready! Please connect your Google Apps Script URL to save data to Sheets. See the README for instructions.");
                }, 800);
                return;
            }

            try {
                const payload = new FormData();
                payload.append("name", name);
                payload.append("email", email);
                payload.append("phone", phone);
                // NOTE: Never send plain-text passwords to Sheets in production.
                // This is for educational/demo purposes only.
                payload.append("timestamp", new Date().toLocaleString("en-IN", { timeZone: "Asia/Kolkata" }));

                const response = await fetch(GOOGLE_SCRIPT_URL, {
                    method: "POST",
                    body: payload
                });

                const result = await response.json();

                if (result.status === "success") {
                    form.reset();
                    showMessage("success", "🎉 Account created successfully! Welcome to HealthTrack.");
                } else {
                    showMessage("error", "Something went wrong. Please try again.");
                }
            } catch (err) {
                console.error(err);
                showMessage("error", "Could not connect. Check your internet and try again.");
            } finally {
                setLoading(false);
            }
        });
    </script>
</body>

</html>
